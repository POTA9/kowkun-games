// Добавляем функцию проверки мата
function isCheckmate(kingX, kingY, board, currentPlayer) {
    // Если король не под шахом, то это не мат
    if (!isKingInCheck(kingX, kingY, board)) {
        return false;
    }
    
    // Проверяем все возможные ходы для всех фигур текущего игрока
    for (let fromX = 0; fromX < 8; fromX++) {
        for (let fromY = 0; fromY < 8; fromY++) {
            const piece = board[fromX][fromY];
            
            // Проверяем только фигуры текущего игрока
            if (currentPlayer === 0 && piece >= 7 && piece <= 12.5) {
                // Белые фигуры (фиолетовые)
                for (let toX = 0; toX < 8; toX++) {
                    for (let toY = 0; toY < 8; toY++) {
                        if (canMoveWithoutCheck(fromX, fromY, toX, toY, board, currentPlayer, kingX, kingY)) {
                            return false; // Найден ход, уводящий из-под шаха
                        }
                    }
                }
            } else if (currentPlayer === 1 && piece >= 1 && piece <= 6) {
                // Черные фигуры (оранжевые)
                for (let toX = 0; toX < 8; toX++) {
                    for (let toY = 0; toY < 8; toY++) {
                        if (canMoveWithoutCheck(fromX, fromY, toX, toY, board, currentPlayer, kingX, kingY)) {
                            return false; // Найден ход, уводящий из-под шаха
                        }
                    }
                }
            }
        }
    }
    
    return true; // Ни одного хода не найдено - мат
}
function canMoveWithoutCheck(fromX, fromY, toX, toY, board, currentPlayer, kingX, kingY) {
    const piece = board[fromX][fromY];
    
    // Пропускаем пустые клетки
    if (piece === 0) return false;
    
    // Проверяем принадлежность фигуры
    if (currentPlayer === 0 && !(piece >= 7 && piece <= 12.5)) return false;
    if (currentPlayer === 1 && !(piece >= 1 && piece <= 6)) return false;
    
    // Проверяем базовые правила движения
    if (!canAttack(fromX, fromY, toX, toY, board)) return false;
    
    // Проверяем, не съедаем ли свою фигуру
    const targetPiece = board[toX][toY];
    if (targetPiece !== 0) {
        if (currentPlayer === 0 && targetPiece >= 7 && targetPiece <= 12.5) return false;
        if (currentPlayer === 1 && targetPiece >= 1 && targetPiece <= 6) return false;
    }
    
    // Для фигур, которым нужен свободный путь
    if (piece === 2 || piece === 2.5 || piece === 8 || piece === 8.5 || 
        piece === 4 || piece === 10 || piece === 5 || piece === 11) {
        if (!isPathClear(fromX, fromY, toX, toY, board)) return false;
    }
    
    // Создаем временную копию доски
    const tempBoard = [];
    for (let i = 0; i < 8; i++) {
        tempBoard[i] = [...board[i]];
    }
    
    // Сохраняем оригинальные значения
    const originalFrom = tempBoard[fromX][fromY];
    const originalTo = tempBoard[toX][toY];
    
    // Выполняем временный ход
    tempBoard[toX][toY] = originalFrom;
    tempBoard[fromX][fromY] = 0;
    
    // Обновляем позицию короля если двигали короля
    let newKingX = kingX;
    let newKingY = kingY;
    if (piece === 6 || piece === 5.5 || piece === 12 || piece === 12.5) {
        newKingX = toX;
        newKingY = toY;
    }
    
    // Проверяем, остался ли король под шахом после хода
    const stillInCheck = isKingInCheck(newKingX, newKingY, tempBoard);
    
    return !stillInCheck;
}

// Функция проверки валидности хода (упрощенная версия)
function isValidMove(fromX, fromY, toX, toY, board, currentPlayer) {
    const piece = board[fromX][fromY];
    
    // Проверяем, что ход соответствует правилам фигуры
    if (!canAttack(fromX, fromY, toX, toY, board)) {
        return false;
    }
    
    // Проверяем, что не съедаем свою фигуру
    const targetPiece = board[toX][toY];
    if ((currentPlayer === 0 && targetPiece >= 7 && targetPiece <= 12.5) ||
        (currentPlayer === 1 && targetPiece >= 1 && targetPiece <= 6)) {
        return false;
    }
    
    // Для ладьи, слона, ферзя проверяем свободный путь
    if (piece === 2 || piece === 2.5 || piece === 8 || piece === 8.5 || 
        piece === 4 || piece === 10 || piece === 5 || piece === 11) {
        return isPathClear(fromX, fromY, toX, toY, board);
    }
    
    return true;
}




// Функция проверки пата
function isStalemate(kingX, kingY, board, currentPlayer) {
    // Если король под шахом, то это не пат
    if (isKingInCheck(kingX, kingY, board)) {
        return false;
    }
    
    // Проверяем все возможные ходы для всех фигур текущего игрока
    for (let fromX = 0; fromX < 8; fromX++) {
        for (let fromY = 0; fromY < 8; fromY++) {
            const piece = board[fromX][fromY];
            
            // Проверяем только фигуры текущего игрока
            if (currentPlayer === 0 && piece >= 7 && piece <= 12.5) {
                // Белые фигуры (фиолетовые)
                for (let toX = 0; toX < 8; toX++) {
                    for (let toY = 0; toY < 8; toY++) {
                        if (canMoveWithoutCheck(fromX, fromY, toX, toY, board, currentPlayer, kingX, kingY)) {
                            return false; // Найден допустимый ход - не пат
                        }
                    }
                }
            } else if (currentPlayer === 1 && piece >= 1 && piece <= 6) {
                // Черные фигуры (оранжевые)
                for (let toX = 0; toX < 8; toX++) {
                    for (let toY = 0; toY < 8; toY++) {
                        if (canMoveWithoutCheck(fromX, fromY, toX, toY, board, currentPlayer, kingX, kingY)) {
                            return false; // Найден допустимый ход - не пат
                        }
                    }
                }
            }
        }
    }
    
    return true; // Ни одного хода не найдено - пат
}
// Обновляем функцию mat() для проверки мата и пата
function mat() {
    // Проверяем мат и пат для обоих игроков после каждого хода

        // Проверяем для белых (фиолетовых)

                showGameOver("Пат! Ничья!");
                return;
            }
        }
    } 
    else if (r == 1) {
        // Проверяем для черных (оранжевых)
        if (isKingInCheck(korbx, korby, a)) {
            if (isCheckmate(korbx, korby, a, 1)) {
                gameOver = true;
                showGameOver("Мат! Фиолетовые выиграли!");
                return;

            // Подсвечиваем шах для черных

                context.fillStyle = '#DC143c';
                context.fillRect(korby * grid, korbx * grid + grid*7/8, grid, grid/8);
            } else {
                context.fillStyle = '#DC143c';
                context.fillRect(korby * grid, korbx * grid, grid, grid/8);
            }
        } else {
            // Проверяем пат для черных
            if (isStalemate(korbx, korby, a, 1)) {
                gameOver = true;
                showGameOver("Пат! Ничья!");
                return;
            }
        }
    }
}

function canAttack(fromX, fromY, toX, toY, board) {
    const piece = board[fromX][fromY];
    const targetPiece = board[toX][toY];

    switch (piece) {
        case 1: // Черная пешка (оранжевая)
            // Атака по диагонали
            if (fromX + 1 === toX && Math.abs(fromY - toY) === 1) {
                return targetPiece !== 0 && targetPiece >= 7; // Может атаковать только белые фигуры
            }
            // Движение вперед
            if (fromY === toY) {
                if (fromX + 1 === toX) {
                    return targetPiece === 0; // Одна клетка вперед
                }
                if (fromX === 1 && fromX + 2 === toX) {
                    return targetPiece === 0 && board[fromX + 1][fromY] === 0; // Две клетки вперед
                }
            }
            break;
            
        case 7: // Белая пешка (фиолетовая)
            // Атака по диагонали
            if (fromX - 1 === toX && Math.abs(fromY - toY) === 1) {
                return targetPiece !== 0 && targetPiece <= 6; // Может атаковать только черные фигуры
            }
            // Движение вперед
            if (fromY === toY) {
                if (fromX - 1 === toX) {
                    return targetPiece === 0; // Одна клетка вперед
                }
                if (fromX === 6 && fromX - 2 === toX) {
                    return targetPiece === 0 && board[fromX - 1][fromY] === 0; // Две клетки вперед
                }
            }
            break;
            
        case 2: case 2.5: case 8: case 8.5: // Ладьи
            if ((fromX === toX || fromY === toY)) {
                return isPathClear(fromX, fromY, toX, toY, board);
            }
            break;
            
        case 3: case 9: // Кони
            return (Math.abs(fromX - toX) === 2 && Math.abs(fromY - toY) === 1) ||
                   (Math.abs(fromX - toX) === 1 && Math.abs(fromY - toY) === 2);
                   
        case 4: case 10: // Слоны
            if (Math.abs(fromX - toX) === Math.abs(fromY - toY)) {
                return isPathClear(fromX, fromY, toX, toY, board);
            }
            break;
            
        case 5: case 11: // Ферзи
            if (fromX === toX || fromY === toY || Math.abs(fromX - toX) === Math.abs(fromY - toY)) {
                return isPathClear(fromX, fromY, toX, toY, board);
            }
            break;
            
        case 6: case 5.5: case 12: case 12.5: // Короли
            return Math.abs(fromX - toX) <= 1 && Math.abs(fromY - toY) <= 1;
    }

    return false;
}

function isPathClear(fromX, fromY, toX, toY, board) {
    // Если мы движемся по вертикали
    if (fromX === toX) {
        let step = (toY > fromY) ? 1 : -1; // Определяем направление движения
        for (let y = fromY + step; y !== toY; y += step) {
            if (board[fromX][y] !== 0) { // Проверяем, занята ли клетка
                return false; // Путь занят
            }
        }
    } 
    // Если мы движемся по горизонтали
    else if (fromY === toY) {
        let step = (toX > fromX) ? 1 : -1; // Определяем направление движения
        for (let x = fromX + step; x !== toX; x += step) {
            if (board[x][fromY] !== 0) { // Проверяем, занята ли клетка
                return false; // Путь занят
            }
        }
    } 
    // Если мы движемся по диагонали
    else if (Math.abs(fromX - toX) === Math.abs(fromY - toY)) {
        let xStep = (toX > fromX) ? 1 : -1;
        let yStep = (toY > fromY) ? 1 : -1;
        let x = fromX + xStep;
        let y = fromY + yStep;
        while (x !== toX && y !== toY) {
            if (board[x][y] !== 0) { // Проверяем, занята ли клетка
                return false; // Путь занят
            }
            x += xStep;
            y += yStep;
        }
    } else {
        return false; // Невозможно двигаться по указанным координатам
    }

    return true; // Путь свободен
}
