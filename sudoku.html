async function getUserRecord(uid) {
        const userRef = doc(db, 'user', uid);

// Функция для получения uid пользователя
async function getUserUID() {
    const login = localStorage.getItem('login'); // Получаем логин из localStorage

    if (login) {
        try {
            const userCollectionRef = collection(db, 'user');
            const q = query(userCollectionRef, where('login', '==', login)); // Запрос для поиска документа с указанным логином
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                let uid; // Объявляем переменную uid
                querySnapshot.forEach((doc) => {
                    const userData = doc.data();
                    uid = userData.uid; // Получаем uid пользователя
                });
                return uid; // Возвращаем uid
            } 
        } catch (error) {
            console.error('Ошибка при получении UID:', error);
        }
    }
    return null; // Возвращаем null, если логин не найден
}

  function isValidSudoku(array) {

      const seen = new Set();
      for (let j = 0; j < 9; j++) {
        const num = array[i][j];

          if (seen.has(num)) {
            return false; // Найдено повторяющееся число
          }
          seen.add(num);
        }
      }
    }

    for (let j = 0; j < 9; j++) {

        }

          }
          seen.add(num);

      }
    }

    for (let startRow = 0; startRow < 9; startRow += 3) {
      for (let startCol = 0; startCol < 9; startCol += 3) {
        const seen = new Set();
        for (let i = 0; i < 3; i++) {

              }

            }
          }
        }
      }
    }
  
    // Проверка на возможность решения судоку
    return canSolveSudoku(array);

  function canSolveSudoku(board) {
    const findEmpty = (board) => {
      for (let row = 0; row < 9; row++) {
        for (let col = 0; col < 9; col++) {
          if (board[row][col] === 0) {
            return [row, col]; // Возвращаем первую пустую клетку
          }
        }
      }
      return null; // Если пустых клеток нет
    };
  
    const isValid = (board, num, row, col) => {
      // Проверка строки
      for (let i = 0; i < 9; i++) {
        if (board[row][i] === num) return false;
      }
      // Проверка столбца
      for (let i = 0; i < 9; i++) {
        if (board[i][col] === num) return false;
      }
      // Проверка 3x3 квадрата
      const startRow = Math.floor(row / 3) * 3;
      const startCol = Math.floor(col / 3) * 3;
      for (let i = 0; i < 3; i++) {
        for (let j = 0; j < 3; j++) {
          if (board[startRow + i][startCol + j] === num) return false;
        }
      }
      return true;
    };
  
    const solve = (board) => {
      const empty = findEmpty(board);
      if (!empty) return true; // Если пустых клеток нет, судоку решено
  
      const [row, col] = empty;
      for (let num = 1; num <= 9; num++) {
        if (isValid(board, num, row, col)) {
          // Пробуем число
          board[row][col] = num;
  
          if (solve(board)) {
            return true; // Если решено, возвращаем true
          }
  
          board[row][col] = 0; // Возвращаемся назад
        }
      }
      return false; // Если не нашли решение
    };
  
    return solve(JSON.parse(JSON.stringify(board))); // Копируем доску, чтобы не модифицировать оригинал
  }
