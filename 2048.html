<html>
<head>
<meta charset="utf-8">
<link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
<title>2048</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
  
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  touch-action: none;
}
.container {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.board-container {
  position: relative;
}
.board {
  display: grid;
  background: #333;
  border-radius: 2vmin;
  position: relative;
  box-sizing: border-box;
}
.cell {
  background: #222;
  border-radius: 1vmin;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tile {
  position: absolute;
  border-radius: 1vmin;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  transition: all 0.15s ease-in-out;
  z-index: 2;
  box-sizing: border-box;
}
.tile.new {
  animation: appear 0.4s ease-in-out;
}
.tile.merged {
  animation: pop 0.4s ease-in-out;
}
.game-over-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  border-radius: 2vmin;
}
.game-over {
  color: #ff66FF;
  margin: 2vmin;
  text-align: center;
  font-size: 4vmin;
  font-weight: bold;
}
.restart {
  color: #9966FF;
  cursor: pointer;
  margin: 2vmin;
  text-decoration: underline;
  font-size: 3vmin;
  padding: 2vmin 4vmin;
  background: rgba(0, 0, 0, 0.8);
  border-radius: 1vmin;
  border: 1px solid #9966FF;
}
@keyframes appear {
  0% { transform: scale(0); }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>

<div class="container">
  <div class="board-container">
    <div class="board" id="board"></div>
    <div class="game-over-overlay" id="gameOverOverlay" style="display: none;">
      <div class="game-over" id="gameOver"></div>
      <div class="restart" onclick="resetGame()" id="restartButton">Играть снова</div>
    </div>
  </div>
</div>

<script>

const boardSize = 4;
let board = [];
let score = 0;
let gameOver = false;
let tiles = {};
let cellSize = 0;
let gapSize = 0;
let boardElement, boardContainer;

// Цвета для плиток
const tileColors = {

  2:  '#999',
  4: '#e0ffff',
  8: '#FF66FF',
  16: '#FF00FF',
  32: '#9966FF',
  64: '#6666ff',
  128: '#CC66FF',
  256: '#66CCFF',
  512: '#CC00CC',
  1024: '#FF6600',
  2048: '#ffffff',
  4096: '#' + (Math.random().toString(16) + '000000').substring(2,8).toUpperCase(),
    8192: '#' + (Math.random().toString(16) + '000000').substring(2,8).toUpperCase(),
   16384: '#' + (Math.random().toString(16) + '000000').substring(2,8).toUpperCase(),
    32768: '#' + (Math.random().toString(16) + '000000').substring(2,8).toUpperCase(),
     65536: '#' + (Math.random().toString(16) + '000000').substring(2,8).toUpperCase(),
       131072: '#' + (Math.random().toString(16) + '000000').substring(2,8).toUpperCase()
};
function getContrastColor(hexColor) {
  // Если цвет не задан, возвращаем белый
  if (!hexColor) return '#fff';
  
  // Преобразуем hex в RGB
  const r = parseInt(hexColor.slice(1, 3), 16);
  const g = parseInt(hexColor.slice(3, 5), 16);
  const b = parseInt(hexColor.slice(5, 7), 16);
  
  // Вычисляем яркость по формуле
  const brightness = (r * 299 + g * 587 + b * 114) / 1000;
  
  // Если яркость больше 128 - возвращаем темный цвет, иначе светлый
  return brightness > 180 ? '#333' : '#fff';
}

function calculateBoardSize() {
  const container = document.querySelector('.container');
  const screenWidth = window.innerWidth;
  const screenHeight = window.innerHeight;
  
  // Берем 90% от минимальной стороны экрана
  const minSide = Math.min(screenWidth, screenHeight);
  const boardTotalSize = minSide * 0.9;
  
  // Вычисляем размер ячейки и промежутков
  cellSize = Math.floor(boardTotalSize / (boardSize + 0.3)); // Учитываем промежутки
  gapSize = Math.floor(cellSize * 0.1); // Промежуток 10% от размера ячейки
  
  // Общая ширина/высота доски
  const boardWidth = cellSize * boardSize + gapSize * (boardSize + 1);
  
  // Устанавливаем размеры доски
  boardElement.style.gridTemplateColumns = `repeat(${boardSize}, ${cellSize}px)`;
  boardElement.style.gridTemplateRows = `repeat(${boardSize}, ${cellSize}px)`;
  boardElement.style.gap = `${gapSize}px`;
  boardElement.style.padding = `${gapSize}px`;
  boardContainer.style.width = `${boardWidth}px`;
  boardContainer.style.height = `${boardWidth}px`;
}

function initBoard() {
  board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
  score = 0;
  gameOver = false;
  tiles = {};
  
  document.getElementById('gameOver').textContent = '';
  document.getElementById('gameOverOverlay').style.display = 'none';
  
  // Создаём DOM для доски
  boardContainer = document.querySelector('.board-container');
  boardElement = document.getElementById('board');
  boardElement.innerHTML = '';
  
  for (let i = 0; i < boardSize; i++) {
    for (let j = 0; j < boardSize; j++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${i}-${j}`;
      boardElement.appendChild(cell);
    }
  }
  
  // Вычисляем размеры доски
  calculateBoardSize();
  
  addRandomTile();
  addRandomTile();
  renderBoard();
}

function addRandomTile() {
  const emptyCells = [];
  for (let i = 0; i < boardSize; i++) {
    for (let j = 0; j < boardSize; j++) {
      if (board[i][j] === 0) {
        emptyCells.push({i, j});
      }
    }
  }
  
  if (emptyCells.length > 0) {
    const {i, j} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    board[i][j] = Math.random() < 0.9 ? 2 : 4;
    
    // Создаём новую плитку с анимацией
    createTile(i, j, board[i][j], true);
  }
}

function createTile(i, j, value, isNew = false) {
  const tileId = `tile-${i}-${j}`;
  const tile = document.createElement('div');
  tile.className = `tile ${isNew ? 'new' : ''}`;
  tile.id = tileId;
  tile.textContent = value;
  tile.style.background = tileColors[value] || '#333';
tile.style.color = getContrastColor(tileColors[value] || '#333');
  tile.style.width = `${cellSize}px`;
  tile.style.height = `${cellSize}px`;
  
  // Точное позиционирование с учетом промежутков
  const left = j * (cellSize + gapSize) + gapSize;
  const top = i * (cellSize + gapSize) + gapSize;
  
  tile.style.left = `${left}px`;
  tile.style.top = `${top}px`;
  
  // Адаптивный размер шрифта
let fontSize = Math.max(12, cellSize * 0.35);
if (value >= 100000) fontSize = Math.max(10, cellSize * 0.25);
if (value >= 1000000) fontSize = Math.max(8, cellSize * 0.2);

tile.style.fontSize = `${fontSize}px`;
  
  document.getElementById('board').appendChild(tile);
  tiles[tileId] = {i, j, value};
}

function renderBoard() {
  // Удаляем все плитки
  Object.keys(tiles).forEach(tileId => {
    const tile = document.getElementById(tileId);
    if (tile) tile.remove();
  });
  tiles = {};
  
  // Создаём новые плитки
  for (let i = 0; i < boardSize; i++) {
    for (let j = 0; j < boardSize; j++) {
      if (board[i][j] !== 0) {
        createTile(i, j, board[i][j]);
      }
    }
  }
}

async function move(direction) {
  if (gameOver) return;
  
  let moved = false;
  
  // Анимируем движение
  switch(direction) {
    case 'left':
      moved = await animateMoveLeft();
      break;
    case 'right':
      moved = await animateMoveRight();
      break;
    case 'up':
      moved = await animateMoveUp();
      break;
    case 'down':
      moved = await animateMoveDown();
      break;
  }
  
  if (moved) {
    addRandomTile();
    
    if (checkWin()) {
      document.getElementById('gameOver').textContent = 'ПОБЕДА!';
      document.getElementById('gameOverOverlay').style.display = 'flex';
      gameOver = true;
    } else if (checkGameOver()) {
      document.getElementById('gameOver').textContent = 'ИГРА ОКОНЧЕНА!';
      document.getElementById('gameOverOverlay').style.display = 'flex';
      gameOver = true;
    }
  }
}

function animateTiles() {
  return new Promise(resolve => {
    setTimeout(resolve, 150);
  });
}

async function animateMoveLeft() {
  let moved = false;
  
  for (let i = 0; i < boardSize; i++) {
    const row = board[i].filter(cell => cell !== 0);
    
    // Слияние
    for (let j = 0; j < row.length - 1; j++) {
      if (row[j] === row[j + 1]) {
        row[j] *= 2;
        score += row[j];
        row[j + 1] = 0;
      }
    }
    
    const newRow = row.filter(cell => cell !== 0);
    while (newRow.length < boardSize) newRow.push(0);
    
    if (JSON.stringify(board[i]) !== JSON.stringify(newRow)) {
      moved = true;
    }
    board[i] = newRow;
  }
  
  await animateTiles();
  renderBoard();
  return moved;
}

async function animateMoveRight() {
  let moved = false;
  
  for (let i = 0; i < boardSize; i++) {
    const row = board[i].filter(cell => cell !== 0);
    
    // Слияние справа налево
    for (let j = row.length - 1; j > 0; j--) {
      if (row[j] === row[j - 1]) {
        row[j] *= 2;
        score += row[j];
        row[j - 1] = 0;
      }
    }
    
    const newRow = row.filter(cell => cell !== 0);
    while (newRow.length < boardSize) newRow.unshift(0);
    
    if (JSON.stringify(board[i]) !== JSON.stringify(newRow)) {
      moved = true;
    }
    board[i] = newRow;
  }
  
  await animateTiles();
  renderBoard();
  return moved;
}

async function animateMoveUp() {
  let moved = false;
  
  for (let j = 0; j < boardSize; j++) {
    const column = [];
    for (let i = 0; i < boardSize; i++) {
      if (board[i][j] !== 0) column.push(board[i][j]);
    }
    
    // Слияние сверху вниз
    for (let i = 0; i < column.length - 1; i++) {
      if (column[i] === column[i + 1]) {
        column[i] *= 2;
        score += column[i];
        column[i + 1] = 0;
      }
    }
    
    const newColumn = column.filter(cell => cell !== 0);
    while (newColumn.length < boardSize) newColumn.push(0);
    
    for (let i = 0; i < boardSize; i++) {
      if (board[i][j] !== newColumn[i]) moved = true;
      board[i][j] = newColumn[i];
    }
  }
  
  await animateTiles();
  renderBoard();
  return moved;
}

async function animateMoveDown() {
  let moved = false;
  
  for (let j = 0; j < boardSize; j++) {
    const column = [];
    for (let i = 0; i < boardSize; i++) {
      if (board[i][j] !== 0) column.push(board[i][j]);
    }
    
    // Слияние снизу вверх
    for (let i = column.length - 1; i > 0; i--) {
      if (column[i] === column[i - 1]) {
        column[i] *= 2;
        score += column[i];
        column[i - 1] = 0;
      }
    }
    
    const newColumn = column.filter(cell => cell !== 0);
    while (newColumn.length < boardSize) newColumn.unshift(0);
    
    for (let i = 0; i < boardSize; i++) {
      if (board[i][j] !== newColumn[i]) moved = true;
      board[i][j] = newColumn[i];
    }
  }
  
  await animateTiles();
  renderBoard();
  return moved;
}

function checkWin() {
  for (let i = 0; i < boardSize; i++) {
    for (let j = 0; j < boardSize; j++) {
      if (board[i][j] === 131072) return true;
    }
  }
  return false;
}

function checkGameOver() {
  // Проверяем есть ли пустые клетки
  for (let i = 0; i < boardSize; i++) {
    for (let j = 0; j < boardSize; j++) {
      if (board[i][j] === 0) return false;
    }
  }
  
  // Проверяем возможны ли слияния
  for (let i = 0; i < boardSize; i++) {
    for (let j = 0; j < boardSize; j++) {
      const current = board[i][j];
      if ((i < boardSize - 1 && board[i + 1][j] === current) ||
          (j < boardSize - 1 && board[i][j + 1] === current)) {
        return false;
      }
    }
  }
  
  return true;
}

function resetGame() {
  initBoard();
}

// Управление клавиатурой
document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowLeft': move('left'); break;
    case 'ArrowRight': move('right'); break;
    case 'ArrowUp': move('up'); break;
    case 'ArrowDown': move('down'); break;
  }
});

// Управление свайпами на телефоне
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

document.addEventListener('touchend', (e) => {
  if (!touchStartX || !touchStartY) return;
  
  const touchEndX = e.changedTouches[0].clientX;
  const touchEndY = e.changedTouches[0].clientY;
  
  const diffX = touchStartX - touchEndX;
  const diffY = touchStartY - touchEndY;
  
  if (Math.abs(diffX) > Math.abs(diffY)) {
    if (diffX > 50) move('left');
    else if (diffX < -50) move('right');
  } else {
    if (diffY > 50) move('up');
    else if (diffY < -50) move('down');
  }
  
  touchStartX = 0;
  touchStartY = 0;
});

// Адаптация к изменению размера экрана
window.addEventListener('resize', function() {
  calculateBoardSize();
  renderBoard();
});

window.addEventListener('orientationchange', function() {
  setTimeout(() => {
    calculateBoardSize();
    renderBoard();
  }, 100);
});

// Запуск игры
initBoard();
</script>
</body>
</html>
