<html>
     <head>
<meta charset="Utf-8">
<link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
	<title>Сапёр</title>
	<style>
	html,
	body {
	height: 100%;
	margin: 0;
	}
	body {
	background: black;
	display: flex;
	align-items: center;
	justify-content: center;
	
	}
	canvas{
	border: 1px solid white;
	}
	</style>
      </head>
<body>

<canvas   id="game"></canvas>


<script>
var canvas = document.getElementById('game');
var context = canvas.getContext('2d');

var grid = 50;
function getRandomInt(min, max){
return Math.floor(Math.random() * (max - min)) + min;
}


var k = 0;
var f = 0;

//отношение сторон 
var w = Math.floor(document.documentElement.clientWidth  / grid);
var h = Math.floor(document.documentElement.clientHeight  / grid);

canvas.width = w * grid;
canvas.height = h * grid;

var a = [];
for (let i = 0; i < w+2; i++){
 let row = [];
for (let j = 0; j < h+2; j++){
context.fillStyle = '#e0ffff';
context.fillRect(i * grid +1, j* grid +1, grid - 2  , grid - 2  );
if (i == 0 || j == 0 || i == w+1 || j == h+1){
row.push(10);
}else{
row.push(0);
}
}
a.push(row);
}
var b = [];
for (let i = 0; i < w+2; i++){
 let row = [];
for (let j = 0; j < h+2; j++){

if (i == 0 || j == 0 || i == w+1 || j == h+1){
row.push(1);
}else{
row.push(0);
}
}
b.push(row);
}



var n = 1;

a[w][h] = -1;
context.font = grid +'px monospace';
context.textAlign = 'center';
context.textBaseline = 'middle';
context.clearRect((w- 1) * grid   , (h- 1) * grid,w * grid   , h * grid );
context.fillStyle = '#e0ffff';
context.fillText('¤' ,  (w-0.5)* grid   , (h-0.5) * grid  );






var p = 0;
var x = 0;
var y = 0;
do{
x =getRandomInt(1, w+1);
y = getRandomInt(1, h+1)
if (a[x][y] == 0){
p++;
a[x][y] = 9;
}
}while (p < Math.floor (w*h/5));

for (let i = 1; i < w+1; i++){
for (let j = 1; j < h+1; j++){
if (   a[i+1][j] == 9 && a[i][j] < 8 ){
a[i][j]++;
}
if ( a[i-1][j] == 9 && a[i][j] < 8){
a[i][j]++;
}
if (  a[i][j+1] == 9 && a[i][j] < 8){
a[i][j]++;
}
if (  a[i][j-1] == 9 && a[i][j] < 8){
a[i][j]++;
}
if (  a[i-1][j-1] == 9 && a[i][j] < 8){
a[i][j]++;
}
if ( a[i+1][j+1] == 9 && a[i][j] < 8){
a[i][j]++;
}
if (  a[i+1][j-1] == 9 && a[i][j] < 8){
a[i][j]++;
}
if ( a[i-1][j+1] == 9 && a[i][j] < 8){
a[i][j]++;
}
}
}
var gameOver = false;
var win = false;
function showGameOver(){
gameOver = true;
context.fillStyle = 'black';
context.globalAlpha = 0.75;
context.fillRect(0, canvas.height / 2 - grid , canvas.width, grid*2);
context.globalAlpha = 1;
context.fillStyle = 'white';
context.font = grid +'px monospace';
context.textAlign = 'center';
context.textBaseline = 'middle';
context.fillText('GAME OVER!', canvas.width / 2, canvas.height / 2);
}
function showWin(){
win = true;
context.fillStyle = 'black';
context.globalAlpha = 0.75;
context.fillRect(0, canvas.height / 2 - grid , canvas.width, grid*2);
context.globalAlpha = 1;
context.fillStyle = 'white';
context.font = grid +'px monospace';
context.textAlign = 'center';
context.textBaseline = 'middle';
context.fillText('WIN!', canvas.width / 2, canvas.height / 2);
}
function gg() {
    const colors = {
        1: '#FF66FF',
        2: '#FF00FF',
        3: '#9966FF',
        4: '#00FFFF',
        5: '#CC66FF',
        6: '#CC00CC',
        7: '#66CCFF',
        8: '#FF6600',
        0: '#999',
        9: '#000'
    };

    context.globalAlpha = 0.4; // Устанавливаем alpha один раз вне цикла

    for (let i = 0; i < w + 2; i++) {
        for (let j = 0; j < h + 2; j++) {
            const value = a[i][j];
            const positionX = (i - 0.5) * grid;
            const positionY = (j - 0.5) * grid;

            if (colors[value] !== undefined) { // Проверяем, есть ли цвет для текущего значения
                context.fillStyle = colors[value];
                context.fillText(value !== 9 ? value : '¤', positionX, positionY);
            }
            // Если значение -1, просто пропускаем (ничего не делаем)
        }
    }
}



function gd() {
    for (let k = 0; k < w * h; k++) {
        // Итерация по всем элементам массива b
        for (let i = 1; i <= w; i++) {
            for (let j = 1; j <= h; j++) {
                // Если текущая клетка обозначена
                if (b[i][j] === 1 && a[i][j] === 0) {
                    // Массив для смещений
                    const shifts = [
                        [1, 0],    // вниз
                        [-1, 0],   // вверх
                        [0, 1],    // вправо
                        [0, -1],   // влево
                        [1, 1],    // диагональ вниз вправо
                        [1, -1],   // диагональ вниз влево
                        [-1, 1],   // диагональ вверх вправо
                        [-1, -1],  // диагональ вверх влево
                    ];

                    // Применяем смещения
                    for (const [dx, dy] of shifts) {
                        const newX = i + dx;
                        const newY = j + dy;
                        // Проверяем границы массива
                        if (newX >= 1 && newX <= w && newY >= 1 && newY <= h) {
                            b[newX][newY] = 1;
                        }
                    }
                }
            }
        }
    }
}



a[w][h] = -1;


function loop() {
rAF = requestAnimationFrame(loop);
f =0;
for (let i = 1; i < w+1; i++){
for (let j = 1; j < h+1; j++){
if (b[i][j] == 2){
f++;
}
}
}

}


document.onclick = (el) => {

let i = Math.floor(el.offsetX/grid) + 1;
let j = Math.floor(el.offsetY/grid) + 1;

context.font = grid +'px monospace';
context.textAlign = 'center';
context.textBaseline = 'middle';

function gc() {
    const colors = {
        0: '#999',
        1: '#FF66FF',
        2: '#FF00FF',
        3: '#9966FF',
        4: '#00FFFF',
        5: '#CC66FF',
        6: '#CC00CC',
        7: '#66CCFF',
        8: '#FF6600',
        9: () => {
            showGameOver();
            gg();
            return null; // Для случая 9 сразу выполняем действия и возвращаем null
        }
    };

    for (let i = 0; i < w + 2; i++) {
        for (let j = 0; j < h + 2; j++) {
            if (b[i][j] === 1 && a[i][j] !== -1) {
                context.fillStyle = '#e0ffff';
                context.fillRect((i - 1) * grid + 1, (j - 1) * grid + 1, grid - 2, grid - 2);
                
                const value = a[i][j];
                const color = colors[value];

                if (color) {
                    if (typeof color === 'function') {
                        // Если color - это функция (для значения 9)
                        color(); // вызываем функцию
                    } else {
                        context.fillStyle = color;
                        context.fillText(value, (i - 0.5) * grid, (j - 0.5) * grid);
                    }
                }
            }
        }
    }
}
if (!gameOver && !win ){



	function gr() {
    let r = 0;
    const directions = [
        [1, 0],  // вниз
        [-1, 0], // вверх
        [0, 1],  // вправо
        [0, -1], // влево
        [1, 1],  // вниз-вправо
        [1, -1], // вниз-влево
        [-1, 1], // вверх-вправо
        [-1, -1] // вверх-влево
    ];
    
    // Проверка на наличие единицы
    if (b[i][j] === 1) {
        for (let direction of directions) {
            const ni = i + direction[0];
            const nj = j + direction[1];
            // Если координаты находятся внутри границ массива
            if (ni >= 0 && nj >= 0 && ni < b.length && nj < b[0].length) {
                if (b[ni][nj] === 2) {
                    r++;
                }
            }
        }

        // Проверка на соответствие r и a
        if (a[i][j] === r) {
            for (let direction of directions) {
                const ni = i + direction[0];
                const nj = j + direction[1];
                // Проверка границ массива
                if (ni >= 0 && nj >= 0 && ni < b.length && nj < b[0].length) {
                    if (b[ni][nj] === 0) {
                        b[ni][nj] = 1;
                    }
                }
            }
        }
    }
}
gr();
gd();
gc();




if (n == 1){
if (  b[i][j] == 0){
b[i][j] = 1;
gd();
gc();

}

} else {



if ( b[i][j] == 0  && f < p){
context.fillStyle = '#000';
context.fillText('╒' ,  (i-0.5)* grid   , (j-0.5) * grid  );
b[i][j] = 2;



if (b[i][j] == 2 && a[i][j] == 9){
k++;

}
} else if ( b[i][j] == 2 ){
if (b[i][j] == 2 && a[i][j] == 9){
k--;
}

b[i][j] = 0;
context.fillStyle = '#e0ffff';
context.fillRect((i-1) * grid +1, (j-1)* grid +1, grid - 2  , grid - 2  );

}

}






if ( a[i][j] == -1){

if (n == 1){
context.clearRect((w- 1) * grid   , (h- 1) * grid,w * grid   , h * grid );
context.fillStyle = '#e0ffff';
context.fillText('╒' ,  (w-0.5)* grid   , (h-0.5) * grid  );
n = 0;

} else {
context.clearRect((w- 1) * grid   , (h- 1) * grid,w * grid   , h * grid );
context.fillStyle = '#e0ffff';
context.fillText('¤' ,  (w-0.5)* grid   , (h-0.5) * grid  );
n++

}

}
if (p == k){
   
showWin();
gg();
}
}




}


addEventListener('mousedown', (event) => {
    const i = Math.floor(event.offsetX / grid) + 1;
    const j = Math.floor(event.offsetY / grid) + 1;

    // Проверка основных условий
    if (b[i][j] === 1 && a[i][j] !== -1 && !gameOver && !win) {
        // Массив смещений для соседних клеток
        const offsets = [
            [1, 0],   // вниз
            [-1, 0],  // вверх
            [0, 1],   // вправо
            [0, -1],  // влево
            [1, 1],   // вправо вниз
            [1, -1],  // влево вниз
            [-1, 1],  // вправо вверх
            [-1, -1]  // влево вверх
        ];

        context.fillStyle = '#99ffff'; // Устанавливаем цвет один раз

        // Проверка соседних клеток
        offsets.forEach(([dx, dy]) => {
            const ni = i + dx;
            const nj = j + dy;

            // Проверяем условия для рисования
            if (b[ni][nj] === 0 && a[ni][nj] !== -1) {
                context.fillRect((ni - 1) * grid + 1, (nj - 1) * grid + 1, grid - 2, grid - 2);
            }
        });
    }


});

addEventListener('mouseup', (event) => {
	context.fillStyle = '#e0ffff';
for (let i = 0; i < w+2; i++){
for (let j = 0; j < h+2; j++){
if (b[i][j] ==  0 && a[i][j] !==  -1 && !gameOver && !win){

context.fillRect((i- 1) * grid  +1 , (j- 1) * grid +1, grid - 2   , grid - 2 );
}
}
}

});

addEventListener('touchstart', (event) => {
let i = Math.floor(event.touches[0].pageX/grid + 0.75);
let j = Math.floor(event.touches[0].pageY/grid + 0.75);
 // Проверка основных условий
 if (b[i][j] === 1 && a[i][j] !== -1 && !gameOver && !win) {
        // Массив смещений для соседних клеток
        const offsets = [
            [1, 0],   // вниз
            [-1, 0],  // вверх
            [0, 1],   // вправо
            [0, -1],  // влево
            [1, 1],   // вправо вниз
            [1, -1],  // влево вниз
            [-1, 1],  // вправо вверх
            [-1, -1]  // влево вверх
        ];

        context.fillStyle = '#99ffff'; // Устанавливаем цвет один раз

        // Проверка соседних клеток
        offsets.forEach(([dx, dy]) => {
            const ni = i + dx;
            const nj = j + dy;

            // Проверяем условия для рисования
            if (b[ni][nj] === 0 && a[ni][nj] !== -1) {
                context.fillRect((ni - 1) * grid + 1, (nj - 1) * grid + 1, grid - 2, grid - 2);
            }
        });
    }

});

addEventListener('touchend', (event) => {
	context.fillStyle = '#e0ffff';
for (let i = 0; i < w+2; i++){
for (let j = 0; j < h+2; j++){
if (b[i][j] ==  0 && a[i][j] !==  -1 && !gameOver && !win){

context.fillRect((i- 1) * grid  +1 , (j- 1) * grid +1, grid - 2   , grid - 2 );
}
}
}

});



 rAF = requestAnimationFrame(loop);

</script>
</body>

</html>
