        // Функция для получения uid пользователя
        async function getUserUID() {
            const login = localStorage.getItem('login'); // Получаем логин из localStorage
    
            if (login) {
                const userCollectionRef = collection(db, 'user');
                const q = query(userCollectionRef, where('login', '==', login));
                const querySnapshot = await getDocs(q);
    
                if (!querySnapshot.empty) {
                    let uid;
                    querySnapshot.forEach((doc) => {
                        const userData = doc.data();
                        uid = userData.uid; // Получаем uid пользователя
                    });
                    return uid; // Возвращаем uid
                } 
            }
            return null; // Возвращаем null, если логин не найден
        }
    
        // Функция для проверки и создания документов notes и settings
        async function checkAndCreateDocuments(uid) {
            const notesRef = doc(db, 'notes', uid);
            const notesDoc = await getDoc(notesRef);
            if (!notesDoc.exists()) {
                await setDoc(notesRef, { notes: [{ text: '', isFavorite: false }] });
                localStorage.setItem('notes', JSON.stringify([{ text: '', isFavorite: false }])); 
            } else {
                const notesData = notesDoc.data().notes;
                localStorage.setItem('notes', JSON.stringify(notesData)); 
            }
    
            const settingsRef = doc(db, 'settings', uid);
            const settingsDoc = await getDoc(settingsRef);
            if (!settingsDoc.exists()) {
                await setDoc(settingsRef, { settings: [] });
                localStorage.setItem('settings', JSON.stringify([])); 
            } else {
                const settingsData = settingsDoc.data().settings;
                localStorage.setItem('settings', JSON.stringify(settingsData)); 
            }
        }
    
        // Функция для обновления notes в Firestore
        async function updateNotes(uid, newNotes) {
            const notesRef = doc(db, 'notes', uid);
            await updateDoc(notesRef, { notes: newNotes });
        }
    
        // Функция для обновления settings в Firestore
        async function updateSettings(uid, newSettings) {
            const settingsRef = doc(db, 'settings', uid);
            await updateDoc(settingsRef, { settings: newSettings });
        }
    
        // Инициализация и проверка документов при загрузке страницы
        async function initialize() {
            const uid = await getUserUID();
            if (uid) {
                await checkAndCreateDocuments(uid); // Проверяем и создаем документы
                startLocalStorageWatcher(uid); // Запускаем наблюдатель за localStorage
            }
        }
    
        // Функция для наблюдения за изменениями в localStorage
// Функция для наблюдения за изменениями в localStorage
function startLocalStorageWatcher(uid) {
    let previousNotes = localStorage.getItem('notes');
    let previousSettings = localStorage.getItem('settings');

    // Функция для проверки и обновления данных
    const checkAndUpdate = async () => {
        const currentNotes = localStorage.getItem('notes');
        const currentSettings = localStorage.getItem('settings');

        if (currentNotes !== previousNotes) {
            previousNotes = currentNotes;
            await updateNotes(uid, JSON.parse(currentNotes));
        }

        if (currentSettings !== previousSettings) {
            previousSettings = currentSettings;
            await updateSettings(uid, JSON.parse(currentSettings));
        }
    };

    // Создание MutationObserver для отслеживания изменений в DOM
    const observer = new MutationObserver(() => {
        checkAndUpdate();
    });

    // Настройка наблюдения за изменениями в body
    observer.observe(document.body, {
        childList: true,
        subtree: true
    });

    // Начальная проверка данных
    checkAndUpdate();
}
window.addEventListener('storage', (event) => {
    if (event.key === 'notes') {
        previousNotes = event.newValue;
        updateNotes(uid, JSON.parse(event.newValue));
    } else if (event.key === 'settings') {
        previousSettings = event.newValue;
        updateSettings(uid, JSON.parse(event.newValue));
    }
});

        let draggingNote = null;
let currentSearchValue = ''; // Переменная для хранения текущего значения поиска
	let editingIndex = null; 

    function updateStarColors() {

function renderNotes() {
    const notes = JSON.parse(localStorage.getItem('notes')) || [];
    notesList.innerHTML = '';
    const settings = JSON.parse(localStorage.getItem('settings')) || {};
    const noteBgColor = settings.noteBgColor || '#ffffff';
    const textColor = settings.textColor || '#333333';
    
    const filteredNotes = notes
        .filter(note => note.text && note.text.toLowerCase().includes(currentSearchValue.toLowerCase()))
        .sort((a, b) => (b.isFavorite - a.isFavorite)); // Сначала избранные

    filteredNotes.forEach((note, index) => {
        const actualIndex = notes.indexOf(note);
        const div = document.createElement('div');
        div.className = 'note draggable';
        div.draggable = true;
        div.dataset.index = actualIndex;
        div.style.backgroundColor = noteBgColor; // Устанавливаем цвет фона заметки
        div.style.color = textColor;

        div.addEventListener('dragstart', dragStart);
        div.addEventListener('dragover', dragOver);
        div.addEventListener('drop', drop);
        div.addEventListener('dragend', dragEnd); // Добавление обработчика dragend

<button class="copy-button" onclick="copyToClipboard('${note.text.replace(/'/g, "\\'").replace(/"/g, '\\\'').replace(/`/g, '\\`').replace(/\n/g, '\\n')}')" title="Скопировать">

</button>

            </div>
        `;
        notesList.appendChild(div);
    });

    // Показываем контейнер, если есть заметки в локальном хранилище
    const hasNotesInStorage = notes.length > 0;
    const hasFilteredNotes = filteredNotes.length > 0;

    notesContainer.style.display = hasNotesInStorage ? 'block' : 'none';
    document.getElementById('searchContainer').style.display = hasNotesInStorage ? 'block' : 'none';
}



        function dragStart(e) {
            draggingNote = e.target; // Сохраняем элемент, который перетаскиваем
            e.dataTransfer.effectAllowed = 'move'; // Разрешаем перемещение
        }

        function dragOver(e) {
    e.preventDefault(); // Позволяем элементу быть перетаскиваемым
    const target = e.target;

    // Проверяем, что целевой элемент - это карточка
    if (target.classList.contains('note')) {
        const draggedIndex = draggingNote.dataset.index; // Получаем индекс перетаскиваемой заметки
        const targetIndex = target.dataset.index; // Получаем индекс целевой заметки

        if (draggedIndex !== targetIndex) { // Проверяем, что индексы разные
            const allNotes = document.querySelectorAll('.note');
            allNotes.forEach(note => note.classList.remove('over')); // Убираем выделение со всех заметок
            target.classList.add('over'); // Добавляем класс для выделения
        }
    }
}

function drop(e) {
    e.preventDefault(); // Предотвращаем стандартное поведение
    const allNotes = document.querySelectorAll('.note');
    allNotes.forEach(note => note.classList.remove('over')); // Убираем выделение со всех заметок

    // Проверяем, что событие произошло на карточке
    const target = e.target.closest('.note'); // Ищем ближайшую карточку

    if (target && draggingNote) {
        const draggedIndex = draggingNote.dataset.index; // Получаем индекс перетаскиваемой заметки
        const targetIndex = target.dataset.index; // Получаем индекс целевой заметки

        if (draggedIndex !== targetIndex) { // Проверяем, что индексы разные
            const notes = JSON.parse(localStorage.getItem('notes')) || [];
            const draggedNote = notes[draggedIndex]; // Сохраняем перетаскиваемую заметку
            notes.splice(draggedIndex, 1); // Удаляем её из оригинального массива
            notes.splice(targetIndex, 0, draggedNote); // Вставляем её на новое место
            localStorage.setItem('notes', JSON.stringify(notes)); // Сохраняем обновленный массив
            renderNotes(); // Перерисовываем заметки
        }
    }

    draggingNote.classList.remove('dragging'); // Убираем класс при завершении перетаскивания
}
function dragEnd() {
    const allNotes = document.querySelectorAll('.note');
    allNotes.forEach(note => note.classList.remove('over')); // Убираем выделение со всех заметок
}

function dragLeave(e) {
    if (e.target.classList.contains('note')) {
        e.target.classList.remove('over'); // Убираем выделение, когда курсор покидает заметку
    }
}

// Добавьте обработчик события dragleave для всех заметок
const allNotes = document.querySelectorAll('.note');
allNotes.forEach(note => {
    note.addEventListener('dragleave', dragLeave);
});



function dragStart(e) {
    draggingNote = e.target; // Сохраняем элемент, который перетаскиваем
    draggingNote.classList.add('dragging'); // Добавляем класс для визуального эффекта
    e.dataTransfer.effectAllowed = 'move'; // Разрешаем перемещение
}

	

function editNote(index) {
    const notes = JSON.parse(localStorage.getItem('notes'));
    const noteInput = document.getElementById('noteInput');
    noteInput.value = notes[index].text; // Заполняем текстовое поле текстом заметки
    editingIndex = index; // Сохраняем индекс редактируемой заметки
    document.querySelector('button[onclick="addNote()"]').style.display = 'none'; // Скрываем кнопку "Добавить заметку"
    document.querySelector('button[onclick="changeNote()"]').style.display = 'block'; // Показываем кнопку "Изменить заметку"
}

// Функция для изменения заметки
function changeNote() {
    const noteInput = document.getElementById('noteInput');
    const noteText = noteInput.value;

    if (noteText && editingIndex !== null) {
        const notes = JSON.parse(localStorage.getItem('notes'));
        notes[editingIndex].text = noteText; // Обновляем текст заметки
        localStorage.setItem('notes', JSON.stringify(notes));
        noteInput.value = ''; // Очищаем поле ввода
        editingIndex = null; // Сбрасываем индекс
        document.querySelector('button[onclick="addNote()"]').style.display = 'block'; // Показываем кнопку "Добавить заметку"
        document.querySelector('button[onclick="changeNote()"]').style.display = 'none'; // Скрываем кнопку "Изменить заметку"
        renderNotes(); // Перерисовываем заметки
    }
}
		
    function addNote() {
        const noteInput = document.getElementById('noteInput');
        const noteText = noteInput.value;
        if (noteText) {
            const notes = JSON.parse(localStorage.getItem('notes')) || [];
            notes.push({ text: noteText, isFavorite: false }); // Добавляем состояние избранного
            localStorage.setItem('notes', JSON.stringify(notes));
            noteInput.value = '';
            renderNotes(); 
        }
    }

function toggleFavorite(index, button) {
    const notes = JSON.parse(localStorage.getItem('notes'));
    notes[index].isFavorite = !notes[index].isFavorite; // Меняем состояние "избранное"
    localStorage.setItem('notes', JSON.stringify(notes)); // Обновляем состояние заметок

    const noteBgColor = JSON.parse(localStorage.getItem('settings')).noteBgColor || '#ffffff';
    const textColor = JSON.parse(localStorage.getItem('settings')).textColor || '#333333';
    const isFavorite = notes[index].isFavorite;
    const starIcon = button.querySelector('.icon');

    // Обновляем цвет звезды
    starIcon.style.color = document.getElementById('textColor').value;
    starIcon.innerHTML = isFavorite ? '★' : '☆'; // Обновляем символ звезды

    // Добавляем класс для анимации
    starIcon.classList.add('fill');

    // Удаляем класс анимации через некоторое время, чтобы можно было повторно применить его
    setTimeout(() => {
        starIcon.classList.remove('fill');
    }, 500); // Длительность анимации

    renderNotes(); // Обновляем отображение
}
function deleteNote(index) {
    const notes = JSON.parse(localStorage.getItem('notes'));
    if (editingIndex === index) {
        // Если удаляемая заметка - это редактируемая заметка
        editingIndex = null; // Сбрасываем индекс редактируемой заметки
        document.getElementById('noteInput').value = ''; // Очищаем поле ввода
        document.querySelector('button[onclick="addNote()"]').style.display = 'block'; // Показываем кнопку «Добавить заметку»
        document.querySelector('button[onclick="changeNote()"]').style.display = 'none'; // Скрываем кнопку «Изменить заметку»
    }
    notes.splice(index, 1);
    localStorage.setItem('notes', JSON.stringify(notes));
    searchNotes(); // Обновляем отображение заметок после удаления
}

function copyToClipboard(text) {
    console.log("Копируем текст:", text); // Отладочная информация

    // Используем navigator.clipboard, если доступен
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
            console.log("Текст скопирован в буфер обмена");
            showNotification();
        }).catch(err => {
            console.error('Ошибка при копировании текста: ', err);
            fallbackCopyToClipboard(text); // Вызов запасного метода
        });
    } else {
        fallbackCopyToClipboard(text); // Вызов запасного метода
    }
}

function fallbackCopyToClipboard(text) {
    const tempInput = document.createElement('textarea');
    tempInput.value = text;
    document.body.appendChild(tempInput);
    tempInput.select();
    try {
        const successful = document.execCommand('copy');
        if (successful) {
            console.log("Текст скопирован через execCommand");
            showNotification();
        } else {
            console.error('Копирование не удалось');
        }
    } catch (err) {
        console.error('Ошибка при копировании текста: ', err);
    }
    document.body.removeChild(tempInput);
}

function showNotification() {
    const notification = document.getElementById('notification');
    notification.style.display = 'block';
    notification.style.opacity = 1;

    setTimeout(() => {
        notification.style.opacity = 0;
        setTimeout(() => {
            notification.style.display = 'none'; // Скрыть полностью после анимации
        }, 500);
    }, 2500);
}



function searchNotes() {
    const searchValue = searchInput.value.toLowerCase();
    const notes = JSON.parse(localStorage.getItem('notes')) || [];

    // Фильтрация заметок по поисковому запросу
    const filteredNotes = notes
        .filter(note => note.text && note.text.toLowerCase().includes(searchValue))
        .sort((a, b) => (b.isFavorite - a.isFavorite)); // Сортировка по избранному

    currentSearchValue = searchInput.value; // Сохраняем текущее значение поиска

    notesList.innerHTML = ''; // Очищаем список заметок для новой отрисовки
    const noteBgColor = JSON.parse(localStorage.getItem('settings')).noteBgColor || '#ffffff';
    const textColor = JSON.parse(localStorage.getItem('settings')).textColor || '#333333';

    filteredNotes.forEach((note, index) => {
        // Получаем исходный индекс заметки
        const originalIndex = notes.indexOf(note);
        const div = document.createElement('div');
        div.className = 'note';
        div.style.backgroundColor = noteBgColor;
        div.style.color = textColor;
        const isFavorite = note.isFavorite;
        div.innerHTML = `
            <div>${marked(note.text)}</div>
            <div class="button-container">
                <button onclick="toggleFavorite(${originalIndex}, this)" title="Избранное" class="favorite-button" style="position: absolute; top: 1px; right: 10px; background: none; border: none;">
                   <span class="icon" style="color:${document.getElementById('textColor').value};">${isFavorite ? '★' : '☆'}</span>
                </button>
                <button class="edit-button" onclick="editNote(${originalIndex})" title="Редактировать">
                    <span class="icon">✏️</span>
                </button>
     <button class="copy-button" onclick="copyToClipboard('${note.text.replace(/'/g, "\\'").replace(/"/g, '\\\'').replace(/`/g, '\\`').replace(/\n/g, '\\n')}')" title="Скопировать">
    <span class="icon">📋</span>
</button>
                <button class="delete-button" onclick="deleteNote(${originalIndex})" title="Удалить">
                    <span class="icon">🗑️</span>
                </button>
            </div>
        `;
        notesList.appendChild(div);
    });

    clearSearch.style.display = currentSearchValue ? 'block' : 'none';
    // Скрываем контейнер, если заметок нет
    notesContainer.style.display = filteredNotes.length > 0 ? 'block' : 'none';
    updateStarColors(); // Обновляем цвет звезд
}

function deleteNote(index) {
    const notes = JSON.parse(localStorage.getItem('notes'));
    if (editingIndex === index) {
        // Если удаляемая заметка - это редактируемая заметка
        editingIndex = null; // Сбрасываем индекс редактируемой заметки
        document.getElementById('noteInput').value = ''; // Очищаем поле ввода
        document.querySelector('button[onclick="addNote()"]').style.display = 'block'; // Показываем кнопку «Добавить заметку»
        document.querySelector('button[onclick="changeNote()"]').style.display = 'none'; // Скрываем кнопку «Изменить заметку»
    }
    notes.splice(index, 1);
    localStorage.setItem('notes', JSON.stringify(notes));
    renderNotes(); // Перерисовываем заметки
}
function clearSearchInput() {
    searchInput.value = ''; // Очищаем поле поиска
    currentSearchValue = ''; // Сбрасываем текущее значение поиска
    renderNotes(); // Обновляем отображение заметок
}

function loadSettings() {
    const settings = JSON.parse(localStorage.getItem('settings'));
    if (settings) {
        document.body.style.backgroundColor = settings.bgColor || '#f4f4f4';
        document.body.style.color = settings.textColor || '#333';

        document.getElementById('bgColor').value = settings.bgColor || '#f4f4f4';
        document.getElementById('buttonColor').value = settings.buttonColor || '#4CAF50';
        document.getElementById('noteBgColor').value = settings.noteBgColor || '#ffffff';
        document.getElementById('textColor').value = settings.textColor || '#333333';
        document.getElementById('buttonTextColor').value = settings.buttonTextColor || '#ffffff';

        // Установите цвет h1
        const h1Color = settings.h1Color || 'rgb(11,11,11)'; // Цвет по умолчанию
        document.querySelector('h1').style.color = h1Color;

        // Установите цвет текста модального окна
        const modalContent = settingsModal.querySelector('.modal-content');

    }
}

    function saveSettings() {
        const settings = {
            bgColor: document.getElementById('bgColor').value,
            buttonColor: document.getElementById('buttonColor').value,
            noteBgColor: document.getElementById('noteBgColor').value,
            textColor: document.getElementById('textColor').value,

function changeBackgroundColor() {
    const bgColor = document.getElementById('bgColor').value;
    document.body.style.backgroundColor = bgColor;
    const textColor = getContrastYIQ(bgColor);
    document.querySelector('h1').style.color = textColor;
    
    document.body.style.color = textColor;

    // Изменяем цвет фона окна настроек
    settingsModal.style.backgroundColor = bgColor; // Изменение фона для модального окна
    const modalContent = settingsModal.querySelector('.modal-content'); // Получаем элемент модального окна
    modalContent.style.backgroundColor = bgColor; // Устанавливаем цвет фона для контента модального окна
    modalContent.style.color = textColor; // Установка цвета текста для контента модального окна

    saveSettings(); 
}

    function getContrastYIQ(hexcolor) {
        var r = parseInt(hexcolor.substr(1, 2), 16);
        var g = parseInt(hexcolor.substr(3, 2), 16);
        var b = parseInt(hexcolor.substr(5, 2), 16);
           // Инвертируем цвета
    // Вычисляем яркость по формуле YIQ
    var yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;

    // Возвращаем черный или белый цвет в зависимости от яркости
    return (yiq >= 128) ? '#000000' : '#FFFFFF';
    }

    function changeButtonColor() {
    const buttonColor = document.getElementById('buttonColor').value;
    const buttons = document.querySelectorAll('button:not(.copy-button)'); // Выбираем все кнопки, кроме кнопки "Копировать"
    document.documentElement.style.setProperty('--button-color', buttonColor); // Обновление переменной CSS
    
    buttons.forEach(button => {
        if (!button.classList.contains('delete-button') && !button.classList.contains('favorite-button') && !button.classList.contains('edit-button')) {
            button.style.backgroundColor = buttonColor; // Меняем цвет фона только для кнопок, не являющихся "Удалить" и "Избранное"
        }
    });
    
    saveSettings();
    }

function changeNoteBackgroundColor() {

    notes.forEach(note => {
        note.style.backgroundColor = noteBgColor;
    });
 // Сохранение нового цвета фона заметок в локальное хранилище

    localStorage.setItem('settings', JSON.stringify(settings));

}

function changeTextColor() {
    const textColor = document.getElementById('textColor').value;
    const notes = document.querySelectorAll('.note div');
    document.documentElement.style.setProperty('--note-text-color', textColor); // Обновление переменной CSS
    const settings = JSON.parse(localStorage.getItem('settings')) || {};
    settings.textColor = textColor;
    localStorage.setItem('settings', JSON.stringify(settings));
    notes.forEach(note => {
        note.style.color = textColor;
    });

    // Обновляем цвет звёздочек
    const notesData = JSON.parse(localStorage.getItem('notes')) || [];
    const noteBgColor = document.getElementById('noteBgColor').value;

    notesData.forEach((note, index) => {
        const isFavorite = note.isFavorite;

        if (starButton) {

}

function changeButtonTextColor() {
    const buttonTextColor = document.getElementById('buttonTextColor').value;
    const buttons = document.querySelectorAll('button');
    buttons.forEach(button => {
        button.style.color = buttonTextColor;
    });

    // Изменяем цвет текста для кнопок звёздочки и ведра
    const favoriteButtons = document.querySelectorAll('.favorite-button .icon, .delete-button .icon, .edit-button .icon');
    favoriteButtons.forEach(icon => {

    });

    saveSettings(); 
}
