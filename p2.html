<style>

    }

        flex-direction: column;
        align-items: center;

        padding: clamp(10px, 3vw, 20px);

        flex-direction: column;

        text-align: center;

        letter-spacing: clamp(1px, 0.5vw, 2px);

        flex-wrap: wrap;

        padding: clamp(20px, 4vw, 30px);
        background: rgba(255, 255, 255, 0.05);
        border-radius: clamp(10px, 2vw, 15px);
        border: 2px solid rgba(255, 255, 255, 0.1);

        transition: all 0.3s ease;

        color: white;
        text-align: center;
        backdrop-filter: blur(10px);
    }

        border-color: rgba(255, 255, 255, 0.3);
    }
    
    .mode-icon {

    }
    
    .mode-name {
        font-size: clamp(1rem, 4.5vw, 1.4rem);

    }
    
    .mode-description {

        color: rgba(255, 255, 255, 0.7);
        font-size: clamp(0.8rem, 3.5vw, 1rem);

    .btn {

        border: 2px solid #333;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: clamp(0.9rem, 3.5vw, 1.1rem);
        width: min(90%, 250px);
        text-align: center;
    }

        color: rgba(255, 255, 255, 0.5);
    }

        background: rgba(255, 255, 255, 0.1);

        font-size: clamp(1rem, 4vw, 1.3rem);
        color: #00ff88;
        animation: pulse 2s infinite;
        text-align: center;

        color: #ff4757;
        margin: clamp(8px, 2vw, 12px) 0;
        text-align: center;
        font-size: clamp(0.9rem, 3.5vw, 1.1rem);

    .back-btn {

    /* Улучшения для касаний на мобильных */
    @media (hover: none) {
        .mode-option:hover {

            border-color: rgba(255, 255, 255, 0.1);

        }
        100% { 
            transform: scale(1); 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); 
        }
    }

    /* Плавная прокрутка */
    html {
        scroll-behavior: smooth;
    }

    /* Фолбэк для старых браузеров */
    @supports not (backdrop-filter: blur(10px)) {
        .mode-option,
        .back-btn {
            background: rgba(255, 255, 255, 0.08);
        }
    }
</style>

// Функция для проверки, что клетка проходима на указанном этаже
function isCellPassable(x, y, floor) {
    const gridX = Math.floor(x / grid);
    const gridY = Math.floor(y / grid);
    
    // Проверяем границы массива
    if (gridX < 0 || gridX >= w || gridY < 0 || gridY >= h) {
        return false;
    }
    
    if (floor === 1) {
        return a[gridX] && a[gridX][gridY] === 1;
    } else {
        return b[gridX] && b[gridX][gridY] === 1;
    }
}

// Функция для проверки, что клетка проходима на обоих этажах
function isCellPassableOnBothFloors(x, y) {
    const gridX = Math.floor(x / grid);
    const gridY = Math.floor(y / grid);
    
    // Клетка проходима только если на ОБОИХ этажах значение 1
    return a[gridX] && a[gridX][gridY] === 1 && 
           b[gridX] && b[gridX][gridY] === 1;
}

// Функция для поиска случайной проходимой клетки
function findRandomPassableCell(floor, maxAttempts = 100) {
    let attempts = 0;
    
    // Сначала создаем временные матрицы, если основные еще не созданы
    let tempMatrix;
    if (floor === 1) {
        tempMatrix = a && a.length > 0 ? a : createTempMatrix();
    } else {
        tempMatrix = b && b.length > 0 ? b : createTempMatrix();
    }
    
    while (attempts < maxAttempts) {
        const gridX = getRandomInt(0, w);
        const gridY = getRandomInt(0, h);
        
        // Проверяем границы
        if (gridX >= 0 && gridX < w && gridY >= 0 && gridY < h) {
            // Проверяем, что клетка проходима на указанном этаже
            if (tempMatrix[gridX] && tempMatrix[gridX][gridY] === 1) {
                return { x: gridX * grid, y: gridY * grid };
            }
        }
        
        attempts++;
    }
    
    // Если не нашли за maxAttempts, возвращаем гарантированно проходимую клетку
    return { x: 0, y: 0 };
}

// Вспомогательная функция для создания временной матрицы
function createTempMatrix() {
    const matrix = [];
    for (let i = 0; i < w; i++) {
        matrix[i] = [];
        for (let j = 0; j < h; j++) {
            // По умолчанию все клетки проходимы
            matrix[i][j] = 1;
        }
    }
    return matrix;
}


// Функция для поиска случайной проходимой клетки на обоих этажах
function findRandomPassableCellOnBothFloors(maxAttempts = 100) {
    let attempts = 0;
    
    while (attempts < maxAttempts) {
        const gridX = getRandomInt(1, w-1);
        const gridY = getRandomInt(1, h-1);
        
        // Проверяем, что индексы в пределах массивов и клетка проходима на обоих этажах
        if (a && a[gridX] !== undefined && a[gridX][gridY] !== undefined &&
            b && b[gridX] !== undefined && b[gridX][gridY] !== undefined &&
            a[gridX][gridY] === 1 && 
            b[gridX][gridY] === 1) {
            return { x: gridX * grid, y: gridY * grid };
        }
        
        attempts++;
    }

                b[i] && b[i][j] === 1) {

            }
        }
    }
    
    // Если вообще не нашли подходящей клетки, создаем гарантированно проходимую
    const safeX = Math.max(1, Math.floor(w/2));
    const safeY = Math.max(1, Math.floor(h/2));
    return { x: safeX * grid, y: safeY * grid };
