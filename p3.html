<html>
     <head>
		
	<title>Заставка</title>
	<link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
	<style>
	html,
	body {
	height: 100%;
	margin: 0;
	}
	body {
	
	background: black;
	display: flex;
	align-items: center;
	justify-content: center;
	cursor: none;
	touch-action: none;

	
	}

	
	</style>
      </head>

<body>
<canvas  id='game'   ></canvas>

<script>
var canvas = document.getElementById('game');
var context = canvas.getContext('2d');
canvas.width = document.documentElement.clientWidth ;
canvas.height = document.documentElement.clientHeight  ;


function getRandomInt(min, max){
return Math.floor(Math.random() * (max - min)) + min;
}

var grid ;
if ( canvas.width > canvas.height){

grid = Math.floor(canvas.height/50);
} else {

grid = Math.floor(canvas.width/50);
}



var snake = {
x: getRandomInt(1, Math.floor(canvas.width - grid)),
y: getRandomInt(1, Math.floor(canvas.height - grid)),
dx: getRandomInt(1, grid),
dy: getRandomInt(1, grid)
};



//console.log(document.documentElement.clientHeight);

var gc = '#' + (Math.random().toString(16) + '000000').substring(2,8).toUpperCase();



function g() {
gc = '#' + (Math.random().toString(16) + '000000').substring(2,8).toUpperCase();
}




var a = 0;
var b = 0;







let lastTime = 0;
const fixedTimeStep = 1000 / 60; // 10 обновлений в секунду (можно настроить)

function loop(timestamp) {
    rAF = requestAnimationFrame(loop);
    
    if (!lastTime) lastTime = timestamp;
    const deltaTime = timestamp - lastTime;
    
    if (deltaTime < fixedTimeStep) {
        return;
    }
    
    lastTime = timestamp - (deltaTime % fixedTimeStep);



context.rotate(a);






if (a == 0){
if ( snake.y <= -1){
if (b == 0){
g();
} 
snake.dy *= -1;
} else 
if (snake.y + grid > canvas.height - 1 ){
snake.dy *= -1;
if (b == 0){
g();
} 

}
if ( snake.x <= -1){
if (b == 0){
g();
} 

snake.dx *= -1;
} else
 if (snake.x + grid > canvas.width - 1){
snake.dx *= -1;

if (b == 0){
g();
} 

}
} else {
if ( snake.y <= -1){
if (b == 0){
g();
} 

snake.dy *= -1;
} else 
if (snake.y + grid > canvas.height/3) {
snake.dy *= -1;

if (b == 0){
g();
} 

}
if ( snake.x <= -1){
if (b == 0){
g();
} 

snake.dx *= -1;
} else
 if (snake.x + grid > canvas.height/3){
snake.dx *= -1;

if (b == 0){
g();
} 

}






}


snake.x += snake.dx;
snake.y += snake.dy;

context.fillStyle = gc;
context.fillRect(snake.x, snake.y, grid, grid);
}

document.addEventListener('touchstart', (event) => {
context.clearRect(-canvas.width, -canvas.height, canvas.width*2, canvas.height*2);

if (a > 0){
a = 0;


context.translate(-canvas.width/2,-canvas.height/2 );






canvas.width = document.documentElement.clientWidth  ;
canvas.height = document.documentElement.clientHeight    ;
if ( canvas.width > canvas.height){

grid = Math.floor(canvas.height/50);
} else {

grid = Math.floor(canvas.width/50);
}

snake.dx = getRandomInt(1, grid)
snake.dy = getRandomInt(1, grid)
} else {


if ( canvas.width > canvas.height){
canvas.width = document.documentElement.clientWidth  ;
canvas.height = document.documentElement.clientHeight  ;
grid = Math.floor(canvas.height/50);
} else {
canvas.width = document.documentElement.clientWidth  ;
canvas.height = document.documentElement.clientHeight / 2 ;
grid = Math.floor(canvas.width/50);
}

a = Math.PI/getRandomInt(180, 360);

context.translate(canvas.width/2,canvas.height/2);

snake.x = getRandomInt(1, Math.floor(canvas.height/3));
snake.y = getRandomInt(1, Math.floor(canvas.height/3));

snake.dx = getRandomInt(1, grid/3)
snake.dy = getRandomInt(1, grid/3)
}


});



document.addEventListener('keydown', function (e) {
if (e.code == 'KeyC'){
context.clearRect(-canvas.width, -canvas.height, canvas.width*2, canvas.height*2);

}

if (e.code == 'KeyN' ){

context.clearRect(-canvas.width, -canvas.height, canvas.width*2, canvas.height*2);

if (a > 0){
a = 0;
context.translate(-canvas.width/2,-canvas.height/2);
canvas.width = document.documentElement.clientWidth ;
canvas.height = document.documentElement.clientHeight  ;
if ( canvas.width > canvas.height){

grid = Math.floor(canvas.height/50);
} else {

grid = Math.floor(canvas.width/50);
}

snake.dx = getRandomInt(1, grid)
snake.dy = getRandomInt(1, grid)
} else {

canvas.width = document.documentElement.clientWidth ;
canvas.height = document.documentElement.clientHeight  ;
if ( canvas.width > canvas.height){

grid = Math.floor(canvas.height/50);
} else {

grid = Math.floor(canvas.width/50);
}


a = Math.PI/getRandomInt(180, 360);
context.translate(canvas.width/2,canvas.height/2);
snake.x = getRandomInt(1, Math.floor(canvas.height/3));
snake.y = getRandomInt(1, Math.floor(canvas.height/3));
snake.dx = getRandomInt(1, grid/3)
snake.dy = getRandomInt(1, grid/3)
}



}
if (e.code == 'KeyR'){
if (a == 0){
snake.dx = getRandomInt(1, grid);
snake.dy = getRandomInt(1,  grid);
} else {

snake.dx = getRandomInt(1, grid/3);
snake.dy = getRandomInt(1,  grid/3);
}


}

if (e.code == 'KeyW'){

b++
gc = '#'+ 'ffffff';
if (b > 1) {
g();
b = 0;
}


}



});

 rAF = requestAnimationFrame(loop);
</script>
</body>
</html>
